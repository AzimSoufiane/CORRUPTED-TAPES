<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORRUPTED TAPES — SF1ONTRACK</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;1,300&family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #090909;
            --text: #f2ede8;
            --accent: #c9a84c;
            --overlay-opacity: 0.04;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Optimization for PC/iPhone */
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle Cinematic Texture Background */
        #texture-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 110%;
            height: 110%;
            pointer-events: none;
            z-index: 0;
            font-family: 'Cormorant Garamond', serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text);
            opacity: var(--overlay-opacity);
            line-height: 1.8;
            user-select: none;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: clamp(2rem, 8vw, 6rem) 24px;
        }

        header {
            text-align: left;
            margin-bottom: clamp(3rem, 10vw, 6rem);
            border-left: 1px solid var(--accent);
            padding-left: clamp(1.5rem, 4vw, 2.5rem);
        }

        .brand-sub {
            font-size: 11px;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1rem;
            display: block;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 10vw, 4.5rem);
            font-weight: 300;
            letter-spacing: -1px;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 2rem;
        }

        .intro-text {
            max-width: 550px;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            opacity: 0.7;
            line-height: 1.4;
        }

        /* Grid Layout */
        .primary-tape { margin-bottom: 100px; }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 80px 40px;
        }

        /* Card Elements */
        .card-trigger {
            cursor: pointer;
            background: none;
            border: none;
            color: inherit;
            text-align: left;
            width: 100%;
            display: block;
            outline: none;
            transition: var(--transition);
        }

        .artwork-wrapper {
            width: 100%;
            position: relative;
            overflow: hidden;
            background: #111;
            border: 1px solid rgba(242, 237, 232, 0.05);
            margin-bottom: 20px;
        }

        .primary-artwork { aspect-ratio: 21/9; }
        .archive-artwork { aspect-ratio: 1/1; }

        .art-img {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            filter: grayscale(20%);
        }

        /* Card Hover Effects */
        @media (hover: hover) {
            .card-trigger:hover .art-img { transform: scale(1.05); filter: grayscale(0); }
            .card-trigger:hover .artwork-wrapper { border-color: var(--accent); }
        }

        /* Typography */
        .meta {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.4rem, 4vw, 1.8rem);
            text-transform: uppercase;
            font-weight: 500;
        }

        .badge { font-size: 9px; border: 1px solid var(--accent); padding: 2px 8px; letter-spacing: 1px; }

        /* MODAL OVERLAY */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(4, 4, 4, 0.98);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            overflow-y: auto;
        }

        #modal-overlay.active { display: block; opacity: 1; }

        .modal-content {
            max-width: 800px;
            margin: 0 auto;
            padding: clamp(3rem, 10vw, 6rem) 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100%;
            justify-content: center;
        }

        .close-modal {
            position: fixed;
            top: 25px;
            right: 25px;
            background: none;
            border: none;
            color: var(--text);
            font-size: 28px;
            cursor: pointer;
            z-index: 1001;
            opacity: 0.5;
        }

        .modal-header {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 6vw, 3rem);
            color: var(--accent);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.1;
        }

        .modal-story {
            font-size: clamp(1rem, 2.5vw, 1.15rem);
            line-height: 1.8;
            font-weight: 300;
            text-align: center;
            margin-bottom: 3rem;
            opacity: 0.9;
        }

        .spotify-preview {
            width: 100%;
            height: 152px;
            border-radius: 12px;
            margin-bottom: 3rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .play-btn {
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 20px 45px;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: var(--transition);
        }

        footer {
            margin-top: 100px;
            padding: 60px 0;
            border-top: 1px solid rgba(242, 237, 232, 0.1);
            text-align: center;
            font-size: 11px;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.4;
        }

        /* INTEGRATED ARTWORK LINKS */
        .art-primary { background-image: url('https://i.ibb.co/MysTVMJw/image.jpg'); }
        .art-0001 { background-image: url('https://i.ibb.co/3m9x8bDm/image.jpg'); }
        .art-0002 { background-image: url('https://i.ibb.co/fYp7pXBj/image.jpg'); }
        .art-0003 { background-image: url('https://i.ibb.co/HTHdwJB0/image.jpg'); }
        .art-0004 { background-image: url('https://i.ibb.co/zWX6fR49/image.jpg'); }

        @media (max-width: 768px) {
            .primary-artwork { aspect-ratio: 1/1; }
            .container { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div id="texture-overlay"></div>

    <!-- MODAL -->
    <div id="modal-overlay" onclick="closeModal()">
        <button class="close-modal">✕</button>
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modal-title" class="modal-header"></h2>
            <p id="modal-story" class="modal-story"></p>
            <div id="spotify-container" style="width: 100%;"></div>
            <a id="modal-link" href="#" target="_blank" class="play-btn">▶ Play on Spotify</a>
        </div>
    </div>

    <div class="container">
        <header>
            <span class="brand-sub">SF1ONTRACK Presents</span>
            <h1>CORRUPTED<br>TAPES</h1>
            <p class="intro-text">
                A personal music curation project — documenting the unfinished. 
                A musical CV, cinematic in scale, emotional by design.
            </p>
        </header>

        <main>
            <!-- PRIMARY TAPE -->
            <button class="card-trigger primary-tape" onclick="openModal('primary')">
                <div class="artwork-wrapper primary-artwork">
                    <div class="art-img art-primary"></div>
                    <div style="position: absolute; bottom: 20px; left: 20px;">
                        <span class="meta" style="color:#fff;">Press Kit</span>
                        <h2 class="title" style="color:#fff; font-size: clamp(1.4rem, 5vw, 2.5rem);">CORRUPTED TAPES (L'AMOUR DE MA VIE)</h2>
                    </div>
                </div>
            </button>

            <div class="archive-grid">
                <!-- Archive 0001 -->
                <button class="card-trigger" onclick="openModal('0001')">
                    <div class="artwork-wrapper archive-artwork">
                        <div class="art-img art-0001"></div>
                        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 10px; font-size: 7px; opacity: 0.15; pointer-events: none; overflow: hidden; font-family: 'Cormorant Garamond'; line-height: 1.5;">
                            MY AFFECTION NEVER ACTUALLY LEAVES MY AFFECTION NEVER ACTUALLY LEAVES MY AFFECTION NEVER ACTUALLY LEAVES MY AFFECTION NEVER ACTUALLY LEAVES
                        </div>
                    </div>
                    <div class="meta">Archive #0001</div>
                    <div class="title">SF1'S GRAVEYARD</div>
                </button>

                <!-- Archive 0002 -->
                <button class="card-trigger" onclick="openModal('0002')">
                    <div class="artwork-wrapper archive-artwork">
                        <div class="art-img art-0002"></div>
                    </div>
                    <div class="meta">Archive #0002 <span style="font-style: italic;">Kanbghik</span></div>
                    <div class="title">SF1'S GRAVEYARD</div>
                </button>

                <!-- Archive 0003 -->
                <button class="card-trigger" onclick="openModal('0003')">
                    <div class="artwork-wrapper archive-artwork">
                        <div class="art-img art-0003"></div>
                    </div>
                    <div class="meta">Archive #0003</div>
                    <div class="title">SF1'S GRAVEYARD</div>
                </button>

                <!-- Archive 0004 -->
                <button class="card-trigger" onclick="openModal('0004')">
                    <div class="artwork-wrapper archive-artwork">
                        <div class="art-img art-0004"></div>
                    </div>
                    <div class="meta">
                        Archive #0004 
                        <span class="badge">Unfinished Project</span>
                    </div>
                    <div class="title">SF1'S GRAVEYARD</div>
                </button>
            </div>
        </main>

        <footer>
            AzimSoufiane / SF1ONTRACK &copy; <span id="year"></span>
        </footer>
    </div>

    <script>
        document.getElementById('year').innerText = new Date().getFullYear();

        // Texture generation
        const texture = document.getElementById('texture-overlay');
        const phrase = "MY AFFECTION NEVER ACTUALLY LEAVES • ";
        texture.innerText = phrase.repeat(500);

        // Modal Data
        const data = {
            'primary': {
                title: "CORRUPTED TAPES (L'AMOUR DE MA VIE)",
                story: "A preservation of the golden hours before everything broke. Inspired by the memory of an early morning date, a hidden café floor, and hours of talking that felt irreplaceable. It stands as a monument to the version of someone who felt like the love of a lifetime, frozen forever in black-and-white.",
                link: "https://open.spotify.com/playlist/4EnZWrQq8XoIzoJy0lblkB",
                id: "4EnZWrQq8XoIzoJy0lblkB"
            },
            '0001': {
                title: "SF1'S GRAVEYARD #0001",
                story: "Built entirely on a hidden, five-letter truth that stays alive in plain sight: My Affection Never Actually Leaves. This project is the permanent baseline—the proof that no matter the distance, the ghost mode, or the silence, the love never actually exited the room.",
                link: "https://open.spotify.com/playlist/4CsEPBBAm1tkoN6KUu05YB",
                id: "4CsEPBBAm1tkoN6KUu05YB"
            },
            '0002': {
                title: "SF1'S GRAVEYARD #0002",
                story: "Kanbghik. A raw, unfiltered late-night confession, wrapped in the heavy, toxic isolation of The Weeknd's After Hours. This is the soundtrack to the 3:00 AM loop, where the protective anger fades away and you are left completely stripped of defenses, facing the simple truth that I still want her.",
                link: "https://open.spotify.com/playlist/1e6caz4NbBkfQRRtm0wJV0",
                id: "1e6caz4NbBkfQRRtm0wJV0"
            },
            '0003': {
                title: "SF1'S GRAVEYARD #0003",
                story: "A preservation of the golden hours before everything broke. Inspired by the memory of an early morning date, a hidden café floor, and hours of talking that felt irreplaceable. It stands as a monument to the version of someone who felt like the love of a lifetime, frozen forever in black-and-white.",
                link: "https://open.spotify.com/playlist/4wEhCaLH7gq0ybsskdTJKH",
                id: "4wEhCaLH7gq0ybsskdTJKH"
            },
            '0004': {
                title: "SF1'S GRAVEYARD #0004",
                story: "A map of how ordinary, everyday music becomes corrupted by a ghost. This curation tracks the painful passage of months where radio hits and pop melodies turn into reminders of the exact moment things fractured, keeping the regret completely fresh.",
                link: "https://open.spotify.com/playlist/26Y6h3a3jVDW7pufJ8N2ba",
                id: "26Y6h3a3jVDW7pufJ8N2ba"
            }
        };

        function openModal(key) {
            const item = data[key];
            document.getElementById('modal-title').innerText = item.title;
            document.getElementById('modal-story').innerText = item.story;
            document.getElementById('modal-link').href = item.link;
            document.getElementById('spotify-container').innerHTML = `<iframe class="spotify-preview" src="https://open.spotify.com/embed/playlist/${item.id}?utm_source=generator&theme=0" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
            
            const modal = document.getElementById('modal-overlay');
            modal.style.display = 'block';
            setTimeout(() => modal.classList.add('active'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('modal-overlay');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                document.getElementById('spotify-container').innerHTML = '';
            }, 400);
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
